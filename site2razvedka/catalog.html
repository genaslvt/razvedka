<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerShop — Каталог</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #1f2937;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }

        .header {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #7c3aed;
            white-space: nowrap;
        }
        .search {
            flex: 1;
            max-width: 400px;
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            background: #f9fafb;
        }
        .search:focus {
            outline: none;
            border-color: #7c3aed;
            background: #fff;
        }
        .header-icons {
            display: flex;
            gap: 18px;
            align-items: center;
            margin-left: auto;
            font-size: 20px;
        }
        .header-icons a { position: relative; }
        .header-icons a:hover { opacity: 0.7; }
        .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px;
            position: sticky;
            top: 64px;
            z-index: 99;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
            overflow-x: auto;
        }
        .nav-inner a {
            padding: 14px 0;
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }
        .nav-inner a:hover,
        .nav-inner a.active {
            color: #7c3aed;
            border-bottom-color: #7c3aed;
        }

        .main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 16px; }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filters select,
        .filters input {
            padding: 10px 14px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            background: #f9fafb;
        }
        .filters select:focus,
        .filters input:focus {
            outline: none;
            border-color: #7c3aed;
        }
        .btn {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
        }
        .btn-accent { background: #7c3aed; color: #fff; }
        .btn-accent:hover { background: #6d28d9; }
        .btn-outline {
            background: #fff;
            color: #7c3aed;
            border: 2px solid #7c3aed;
        }
        .btn-outline:hover { background: #f5f3ff; }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 18px;
        }
        .product-card {
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
        }
        .product-card:hover {
            box-shadow: 0 6px 20px rgba(0,0,0,0.08);
            transform: translateY(-3px);
        }
        .product-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: #f3f4f6;
        }
        .product-info { padding: 14px; }
        .product-info h3 { font-size: 15px; margin-bottom: 4px; }
        .product-info .cat { font-size: 12px; color: #9ca3af; margin-bottom: 6px; }
        .price {
            font-size: 18px;
            font-weight: 700;
            color: #7c3aed;
        }
        .colors { display: flex; gap: 6px; margin: 8px 0; }
        .color-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
        }
        .footer {
            text-align: center;
            padding: 24px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
            font-size: 14px;
            margin-top: auto;
        }
        @media (max-width: 600px) {
            .header-inner { flex-wrap: wrap; height: auto; padding: 10px 0; }
            .search { order: 3; flex: 100%; max-width: 100%; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">SneakerShop</a>
            <input class="search" type="text" placeholder="Поиск обуви...">
            <div class="header-icons">
                <a href="index.html">🏠</a>
                <a href="#" onclick="openModal('authModal')">👤</a>
                <a href="catalog.html" style="position:relative;">
                    🛒<span class="badge">2</span>
                </a>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html">Главная</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="contacts.html">Контакты</a>
            <a href="about.html">О нас</a>
            <a href="#" onclick="openModal('profileModal')">Личный кабинет</a>
        </div>
    </nav>

    <main class="main">
        <h2 class="section-title">Каталог обуви</h2>
        <div class="filters">
            <select>
                <option>Все бренды</option>
                <option>Nike</option>
                <option>Adidas</option>
                <option>Puma</option>
                <option>Reebok</option>
            </select>
            <select>
                <option>Все размеры</option>
                <option>39</option>
                <option>40</option>
                <option>41</option>
                <option>42</option>
                <option>43</option>
            </select>
            <input type="number" placeholder="Цена до" style="width:110px;">
            <button class="btn btn-accent">Применить</button>
            <button class="btn btn-outline">Сбросить</button>
        </div>
        <div class="product-grid" id="catalogGrid"></div>
    </main>

    <footer class="footer">© 2026 SneakerShop</footer>

    <!-- Модальные окна (такие же как в index.html) -->
    <div id="authModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:200; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:28px; border-radius:16px; width:90%; max-width:400px; position:relative;">
            <button onclick="closeModal('authModal')" style="position:absolute; top:12px; right:14px; background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
            <div id="loginForm">
                <h3 style="margin-bottom:16px;">Вход</h3>
                <input type="email" placeholder="Email" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px;">
                <input type="password" placeholder="Пароль" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:12px;">
                <button class="btn btn-accent" style="width:100%;">Войти</button>
                <p style="margin-top:10px; font-size:13px; text-align:center;">Нет аккаунта? <a href="#" onclick="toggleAuth()" style="color:#7c3aed;">Регистрация</a></p>
            </div>
            <div id="registerForm" style="display:none;">
                <h3 style="margin-bottom:16px;">Регистрация</h3>
                <input type="text" placeholder="Имя" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px;">
                <input type="email" placeholder="Email" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px;">
                <input type="password" placeholder="Пароль" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:12px;">
                <button class="btn btn-accent" style="width:100%;">Создать аккаунт</button>
                <p style="margin-top:10px; font-size:13px; text-align:center;">Есть аккаунт? <a href="#" onclick="toggleAuth()" style="color:#7c3aed;">Войти</a></p>
            </div>
        </div>
    </div>

    <div id="profileModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:200; justify-content:center; align-items:center;">
        <div style="background:#fff; padding:28px; border-radius:16px; width:90%; max-width:460px; position:relative;">
            <button onclick="closeModal('profileModal')" style="position:absolute; top:12px; right:14px; background:none; border:none; font-size:20px; cursor:pointer;">✕</button>
            <h3 style="margin-bottom:16px;">Личный кабинет</h3>
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:14px;">
                <div id="avatarPreview2" style="width:64px; height:64px; border-radius:50%; background:#f3f4f6; display:flex; align-items:center; justify-content:center; font-size:28px; overflow:hidden;">👤</div>
                <input type="file" accept="image/*" onchange="previewAvatar2(event)" style="font-size:13px;">
            </div>
            <label style="font-size:13px; color:#6b7280;">Имя</label>
            <input type="text" value="Алексей" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin:4px 0 10px;">
            <label style="font-size:13px; color:#6b7280;">Email</label>
            <input type="email" value="alex@mail.ru" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin:4px 0 10px;">
            <label style="font-size:13px; color:#6b7280;">Телефон</label>
            <input type="tel" value="+7 (999) 123-45-67" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin:4px 0 14px;">
            <hr style="margin-bottom:12px;">
            <div style="font-size:13px; margin-bottom:8px; display:flex; align-items:flex-start; gap:6px;">
                <input type="checkbox" checked style="margin-top:2px;">
                <label>Согласие на обработку данных</label>
            </div>
            <div style="font-size:13px; margin-bottom:12px; display:flex; align-items:flex-start; gap:6px;">
                <input type="checkbox">
                <label>Принимаю <a href="#" style="color:#7c3aed;">пользовательское соглашение</a></label>
            </div>
            <button class="btn btn-accent" style="width:100%;">Сохранить</button>
        </div>
    </div>

    <script>
        const products = [
            { id: 1, name: "Nike Air Max", price: 13990, img: "https://placehold.co/400x300/7c3aed/white?text=Nike", colors: ["#000","#fff"] },
            { id: 2, name: "Adidas Ultraboost", price: 15990, img: "https://placehold.co/400x300/1f2937/white?text=Adidas", colors: ["#1f2937","#fff"] },
            { id: 3, name: "Puma Velocity", price: 10990, img: "https://placehold.co/400x300/10b981/white?text=Puma", colors: ["#10b981","#000"] },
            { id: 4, name: "Reebok Nano X4", price: 12490, img: "https://placehold.co/400x300/6366f1/white?text=Reebok", colors: ["#6366f1","#fff"] },
            { id: 5, name: "Asics Gel Kayano", price: 14990, img: "https://placehold.co/400x300/ef4444/white?text=Asics", colors: ["#ef4444","#000"] },
            { id: 6, name: "New Balance 574", price: 11990, img: "https://placehold.co/400x300/8b5cf6/white?text=NB", colors: ["#8b5cf6","#fff"] },
        ];

        document.getElementById('catalogGrid').innerHTML = products.map(p => `
            <div class="product-card" onclick="location.href='product.html?id=${p.id}'">
                <img src="${p.img}" alt="${p.name}">
                <div class="product-info">
                    <p class="cat">Кроссовки</p>
                    <h3>${p.name}</h3>
                    <div class="colors">${p.colors.map(c => `<div class="color-dot" style="background:${c};"></div>`).join('')}</div>
                    <p class="price">${p.price.toLocaleString()} ₽</p>
                </div>
            </div>
        `).join('');

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        function toggleAuth() {
            document.getElementById('loginForm').style.display =
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerForm').style.display =
                document.getElementById('registerForm').style.display === 'none' ? 'block' : 'none';
        }
        function previewAvatar2(e) {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => {
                    document.getElementById('avatarPreview2').innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:cover;">`;
                };
                r.readAsDataURL(f);
            }
        }
        window.onclick = function(e) {
            if (e.target.id === 'authModal') closeModal('authModal');
            if (e.target.id === 'profileModal') closeModal('profileModal');
        };
    </script>
</body>
</html>
