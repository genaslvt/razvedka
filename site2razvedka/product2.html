<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerShop — Товар</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 20px;
        }
        .logo { font-size: 24px; font-weight: 800; color: #a78bfa; }
        .search {
            flex: 1;
            max-width: 400px;
            padding: 10px 16px;
            border: 2px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
        }
        .search:focus { outline: none; border-color: #a78bfa; }
        .search::placeholder { color: #64748b; }
        .header-icons {
            display: flex;
            gap: 14px;
            align-items: center;
            margin-left: auto;
            font-size: 20px;
        }
        .header-icons a { position: relative; }
        .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .theme-toggle {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 20px;
            position: sticky;
            top: 64px;
            z-index: 99;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
        }
        .nav-inner a {
            padding: 14px 0;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
        }
        .nav-inner a:hover,
        .nav-inner a.active { color: #a78bfa; border-bottom-color: #a78bfa; }
        .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }
        .product-detail {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .product-detail img {
            width: 450px;
            max-width: 100%;
            border-radius: 14px;
            background: #334155;
        }
        .detail-info { flex: 1; min-width: 280px; }
        .detail-info h1 { font-size: 28px; margin-bottom: 8px; }
        .price {
            font-size: 26px;
            font-weight: 700;
            color: #a78bfa;
            margin-bottom: 12px;
        }
        .desc { color: #94a3b8; margin-bottom: 16px; line-height: 1.5; }
        .colors-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #475569;
            cursor: pointer;
        }
        .color-option.active { border-color: #a78bfa; }
        .size-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .size-option {
            padding: 10px 18px;
            border: 1px solid #475569;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .size-option.active {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-accent { background: #7c3aed; color: #fff; }
        .btn-accent:hover { background: #6d28d9; }
        .btn-outline {
            background: transparent;
            color: #a78bfa;
            border: 2px solid #a78bfa;
        }
        .btn-outline:hover { background: #1e1b4b; }
        .btn-green { background: #10b981; color: #fff; width: 100%; }
        .btn-green:hover { background: #059669; }
        .footer {
            text-align: center;
            padding: 24px;
            color: #64748b;
            border-top: 1px solid #334155;
            font-size: 14px;
        }
        .footer a { color: #a78bfa; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <a href="index2.html" class="logo">SneakerShop</a>
            <input class="search" type="text" placeholder="Поиск...">
            <div class="header-icons">
                <a href="index2.html">🏠</a>
                <a href="profile2.html">👤</a>
                <a href="catalog2.html" style="position:relative;">🛒<span class="badge">2</span></a>
                <a href="product.html" class="theme-toggle">☀️</a>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="nav-inner">
            <a href="index2.html">Главная</a>
            <a href="catalog2.html" class="active">Каталог</a>
            <a href="contacts2.html">Контакты</a>
            <a href="about2.html">О нас</a>
            <a href="profile2.html">Личный кабинет</a>
        </div>
    </nav>

    <main class="main">
        <div class="product-detail" id="productContent"></div>
    </main>

    <footer class="footer">
        <p>© 2026 SneakerShop | <a href="product.html">☀️ Светлая тема</a></p>
    </footer>

    <script>
        const products = {
            1: { name: "Nike Air Max", price: 13990, img: "https://placehold.co/600x500/7c3aed/white?text=Nike", desc: "Лёгкие кроссовки с амортизацией.", colors: ["#000","#fff"], sizes: [39,40,41,42] },
            2: { name: "Adidas Ultraboost", price: 15990, img: "https://placehold.co/600x500/1f2937/white?text=Adidas", desc: "Премиальная амортизация Boost.", colors: ["#1f2937","#fff"], sizes: [40,41,42,43] },
            3: { name: "Puma Velocity", price: 10990, img: "https://placehold.co/600x500/10b981/white?text=Puma", desc: "Для тренировок.", colors: ["#10b981","#000"], sizes: [39,40,41] },
            4: { name: "Reebok Nano X4", price: 12490, img: "https://placehold.co/600x500/6366f1/white?text=Reebok", desc: "Кроссфит-модель.", colors: ["#6366f1","#fff"], sizes: [41,42,43,44] },
            5: { name: "Asics Gel Kayano", price: 14990, img: "https://placehold.co/600x500/ef4444/white?text=Asics", desc: "Для длинных пробежек.", colors: ["#ef4444","#000"], sizes: [40,41,42] },
            6: { name: "New Balance 574", price: 11990, img: "https://placehold.co/600x500/8b5cf6/white?text=NB", desc: "Классический силуэт.", colors: ["#8b5cf6","#fff"], sizes: [39,40,41,42] },
        };
        const params = new URLSearchParams(window.location.search);
        const p = products[params.get('id') || 1];
        document.getElementById('productContent').innerHTML = `
            <img src="${p.img}" alt="${p.name}">
            <div class="detail-info">
                <h1>${p.name}</h1>
                <p class="price">${p.price.toLocaleString()} ₽</p>
                <p class="desc">${p.desc}</p>
                <p style="font-weight:600;">Цвет:</p>
                <div class="colors-row">${p.colors.map((c,i) => `<div class="color-option ${i===0?'active':''}" style="background:${c};" onclick="selectColor(this)"></div>`).join('')}</div>
                <p style="font-weight:600;">Размер:</p>
                <div class="size-row">${p.sizes.map(s => `<div class="size-option" onclick="selectSize(this)">${s}</div>`).join('')}</div>
                <button class="btn btn-accent" onclick="alert('Добавлено в корзину!')">🛒 В корзину</button>
                <a href="catalog2.html" class="btn btn-outline">Продолжить покупки</a>
                <button class="btn btn-green" style="margin-top:12px;" onclick="alert('Покупка в 1 клик!')">⚡ Купить в 1 клик</button>
            </div>
        `;
        function selectColor(el) {
            document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }
        function selectSize(el) {
            document.querySelectorAll('.size-option').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
