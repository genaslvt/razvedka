<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerShop — Карточка товара</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #ffffff;
            color: #1f2937;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }

        .header {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 20px;
        }
        .logo { font-size: 24px; font-weight: 800; color: #7c3aed; }
        .search {
            flex: 1;
            max-width: 400px;
            padding: 10px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 14px;
            background: #f9fafb;
        }
        .search:focus { outline: none; border-color: #7c3aed; }
        .header-icons {
            display: flex;
            gap: 18px;
            font-size: 20px;
            margin-left: auto;
        }
        .header-icons a { position: relative; }
        .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .nav {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 20px;
            position: sticky;
            top: 64px;
            z-index: 99;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
        }
        .nav-inner a {
            padding: 14px 0;
            font-size: 14px;
            font-weight: 500;
            color: #6b7280;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
        }
        .nav-inner a:hover,
        .nav-inner a.active {
            color: #7c3aed;
            border-bottom-color: #7c3aed;
        }

        .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }

        .product-detail {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
        }
        .product-detail img {
            width: 450px;
            max-width: 100%;
            border-radius: 14px;
            background: #f3f4f6;
        }
        .detail-info { flex: 1; min-width: 280px; }
        .detail-info h1 { font-size: 28px; margin-bottom: 8px; }
        .detail-info .price {
            font-size: 26px;
            font-weight: 700;
            color: #7c3aed;
            margin-bottom: 12px;
        }
        .detail-info .desc {
            color: #6b7280;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        .colors-row { display: flex; gap: 10px; margin-bottom: 16px; }
        .color-option {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid #e5e7eb;
            cursor: pointer;
            transition: 0.2s;
        }
        .color-option:hover,
        .color-option.active { border-color: #7c3aed; }
        .size-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
        .size-option {
            padding: 10px 18px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 14px;
        }
        .size-option:hover,
        .size-option.active {
            background: #7c3aed;
            color: #fff;
            border-color: #7c3aed;
        }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }
        .btn-accent { background: #7c3aed; color: #fff; }
        .btn-accent:hover { background: #6d28d9; }
        .btn-outline {
            background: #fff;
            color: #7c3aed;
            border: 2px solid #7c3aed;
        }
        .btn-outline:hover { background: #f5f3ff; }
        .btn-green { background: #10b981; color: #fff; }
        .btn-green:hover { background: #059669; }
        .footer {
            text-align: center;
            padding: 24px;
            color: #9ca3af;
            border-top: 1px solid #e5e7eb;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-inner">
            <a href="index.html" class="logo">SneakerShop</a>
            <input class="search" type="text" placeholder="Поиск обуви...">
            <div class="header-icons">
                <a href="index.html">🏠</a>
                <a href="#">👤</a>
                <a href="catalog.html" style="position:relative;">
                    🛒<span class="badge">2</span>
                </a>
            </div>
        </div>
    </header>

    <nav class="nav">
        <div class="nav-inner">
            <a href="index.html">Главная</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="contacts.html">Контакты</a>
            <a href="about.html">О нас</a>
            <a href="#">Личный кабинет</a>
        </div>
    </nav>

    <main class="main">
        <div class="product-detail" id="productContent"></div>
    </main>

    <footer class="footer">© 2026 SneakerShop</footer>

    <script>
        const products = {
            1: { name: "Nike Air Max", price: 13990, img: "https://placehold.co/600x500/7c3aed/white?text=Nike+Air+Max", desc: "Лёгкие кроссовки с отличной амортизацией. Идеальны для бега и повседневной носки.", colors: ["#000","#fff","#7c3aed"], sizes: [39,40,41,42,43] },
            2: { name: "Adidas Ultraboost", price: 15990, img: "https://placehold.co/600x500/1f2937/white?text=Adidas+UB", desc: "Премиальная амортизация Boost. Возврат энергии при каждом шаге.", colors: ["#1f2937","#fff"], sizes: [40,41,42,43,44] },
            3: { name: "Puma Velocity", price: 10990, img: "https://placehold.co/600x500/10b981/white?text=Puma", desc: "Универсальные кроссовки для тренировок и активного отдыха.", colors: ["#10b981","#000"], sizes: [39,40,41,42] },
            4: { name: "Reebok Nano X4", price: 12490, img: "https://placehold.co/600x500/6366f1/white?text=Reebok", desc: "Кроссовки для кроссфита с усиленной подошвой.", colors: ["#6366f1","#fff"], sizes: [41,42,43,44] },
            5: { name: "Asics Gel Kayano", price: 14990, img: "https://placehold.co/600x500/ef4444/white?text=Asics", desc: "Стабильность и комфорт для длительных пробежек.", colors: ["#ef4444","#000"], sizes: [40,41,42,43] },
            6: { name: "New Balance 574", price: 11990, img: "https://placehold.co/600x500/8b5cf6/white?text=NB+574", desc: "Классический силуэт в современном исполнении.", colors: ["#8b5cf6","#fff"], sizes: [39,40,41,42] },
        };

        const params = new URLSearchParams(window.location.search);
        const id = params.get('id') || 1;
        const p = products[id];

        document.getElementById('productContent').innerHTML = `
            <img src="${p.img}" alt="${p.name}">
            <div class="detail-info">
                <h1>${p.name}</h1>
                <p class="price">${p.price.toLocaleString()} ₽</p>
                <p class="desc">${p.desc}</p>
                <p style="font-weight:600; margin-bottom:8px;">Цвет:</p>
                <div class="colors-row">
                    ${p.colors.map((c, i) => `<div class="color-option ${i===0?'active':''}" style="background:${c};" onclick="selectColor(this)"></div>`).join('')}
                </div>
                <p style="font-weight:600; margin-bottom:8px;">Размер:</p>
                <div class="size-row">
                    ${p.sizes.map(s => `<div class="size-option" onclick="selectSize(this)">${s}</div>`).join('')}
                </div>
                <div style="margin-top:20px;">
                    <button class="btn btn-accent" onclick="alert('Товар добавлен в корзину!')">🛒 В корзину</button>
                    <a href="catalog.html" class="btn btn-outline">Продолжить покупки</a>
                </div>
                <button class="btn btn-green" style="margin-top:12px; width:100%;" onclick="alert('Покупка в 1 клик!')">⚡ Купить в 1 клик</button>
            </div>
        `;

        function selectColor(el) {
            document.querySelectorAll('.color-option').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
        }
        function selectSize(el) {
            document.querySelectorAll('.size-option').forEach(s => s.classList.remove('active'));
            el.classList.add('active');
        }
    </script>
</body>
</html>
