<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SneakerShop — Контакты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }
        a { text-decoration: none; color: inherit; }
        .header {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 20px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            height: 64px;
            gap: 20px;
        }
        .logo { font-size: 24px; font-weight: 800; color: #a78bfa; }
        .search {
            flex: 1;
            max-width: 400px;
            padding: 10px 16px;
            border: 2px solid #334155;
            border-radius: 10px;
            background: #0f172a;
            color: #e2e8f0;
        }
        .search:focus { outline: none; border-color: #a78bfa; }
        .header-icons {
            display: flex;
            gap: 14px;
            font-size: 20px;
            margin-left: auto;
        }
        .header-icons a { position: relative; }
        .badge {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ef4444;
            color: #fff;
            font-size: 10px;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }
        .theme-toggle {
            background: #f1f5f9;
            color: #1e293b;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }
        .nav {
            background: #1e293b;
            border-bottom: 1px solid #334155;
            padding: 0 20px;
            position: sticky;
            top: 64px;
            z-index: 99;
        }
        .nav-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            gap: 28px;
        }
        .nav-inner a {
            padding: 14px 0;
            font-size: 14px;
            font-weight: 500;
            color: #94a3b8;
            border-bottom: 2px solid transparent;
        }
        .nav-inner a:hover,
        .nav-inner a.active { color: #a78bfa; border-bottom-color: #a78bfa; }
        .main { max-width: 1200px; margin: 0 auto; padding: 24px 20px 40px; }
        .section-title { font-size: 22px; font-weight: 700; margin-bottom: 18px; }
        .contact-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 28px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            max-width: 700px;
        }
        .contact-card p { margin-bottom: 10px; line-height: 1.6; }
        .footer {
            text-align: center;
            padding: 24px;
            color: #64748b;
            border-top: 1px solid #334155;
        }
        .footer a { color: #a78bfa; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <a href="index2.html" class="logo">SneakerShop</a>
            <input class="search" type="text" placeholder="Поиск...">
            <div class="header-icons">
                <a href="index2.html">🏠</a>
                <a href="profile2.html">👤</a>
                <a href="catalog2.html" style="position:relative;">🛒<span class="badge">2</span></a>
                <a href="contacts.html" class="theme-toggle">☀️</a>
            </div>
        </div>
    </header>
    <nav class="nav">
        <div class="nav-inner">
            <a href="index2.html">Главная</a>
            <a href="catalog2.html">Каталог</a>
            <a href="contacts2.html" class="active">Контакты</a>
            <a href="about2.html">О нас</a>
            <a href="profile2.html">Личный кабинет</a>
        </div>
    </nav>
    <main class="main">
        <h2 class="section-title">Контакты</h2>
        <div class="contact-card">
            <div>
                <p><strong>📞 Телефон:</strong><br>+7 (999) 123-45-67</p>
                <p><strong>✉️ Email:</strong><br>hello@sneakershop.ru</p>
            </div>
            <div>
                <p><strong>📍 Адрес:</strong><br>г. Москва, ул. Спортивная, 15</p>
                <p><strong>🕐 Режим работы:</strong><br>Пн–Пт: 10:00–20:00<br>Сб–Вс: 11:00–18:00</p>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>© 2026 SneakerShop | <a href="contacts.html">☀️ Светлая тема</a></p>
    </footer>
</body>
</html>
