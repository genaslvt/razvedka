<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть — Регистрация (Тёмная)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1e293b;
            padding: 32px 28px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            position: relative;
        }
        .theme-toggle {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #334155;
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card h2 {
            text-align: center;
            color: #818cf8;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .field { margin-bottom: 14px; }
        .field label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 4px;
        }
        .field input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #334155;
            border-radius: 8px;
            font-size: 14px;
            background: #0f172a;
            color: #f1f5f9;
        }
        .field input:focus { outline: none; border-color: #818cf8; }
        .field input.error { border-color: #ef4444; background: #450a0a; }
        .field input.valid { border-color: #10b981; background: #064e3b; }
        .error-text { color: #ef4444; font-size: 11px; margin-top: 3px; display: none; }
        .error-text.show { display: block; }
        .btn {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
        }
        .btn:hover { background: #818cf8; }
        .link {
            text-align: center;
            margin-top: 14px;
            font-size: 13px;
        }
        .link a { color: #818cf8; text-decoration: none; font-weight: 500; }
        .success-box {
            display: none;
            background: #064e3b;
            border: 1px solid #10b981;
            color: #a7f3d0;
            padding: 14px;
            border-radius: 8px;
            text-align: center;
            margin-top: 12px;
        }
        .success-box.show { display: block; }
    </style>
</head>
<body>
    <div class="card">
        <button class="theme-toggle" onclick="window.location.href='register.html'">☀️</button>
        <h2>Регистрация</h2>
        <form id="registerForm" onsubmit="return handleSubmit(event)">
            <div class="field">
                <label>Логин (латиница и цифры, минимум 6)</label>
                <input type="text" id="login" autocomplete="off">
                <span class="error-text" id="loginError"></span>
            </div>
            <div class="field">
                <label>Пароль (минимум 8 символов)</label>
                <input type="password" id="password">
                <span class="error-text" id="passwordError"></span>
            </div>
            <div class="field">
                <label>ФИО (кириллица и пробелы)</label>
                <input type="text" id="fullName" autocomplete="off">
                <span class="error-text" id="fullNameError"></span>
            </div>
            <div class="field">
                <label>Телефон (8(XXX)XXX-XX-XX)</label>
                <input type="text" id="phone" placeholder="8(999)123-45-67">
                <span class="error-text" id="phoneError"></span>
            </div>
            <div class="field">
                <label>Email</label>
                <input type="email" id="email" autocomplete="off">
                <span class="error-text" id="emailError"></span>
            </div>
            <button type="submit" class="btn">Создать пользователя</button>
            <div class="success-box" id="successBox">✅ Регистрация успешна!</div>
        </form>
        <p class="link">Уже зарегистрированы? <a href="login2.html">Войти</a></p>
        <p class="link"><a href="register.html">☀️ Светлая версия</a></p>
    </div>

    <script>
        const rules = {
            login: { validate: v => /^[a-zA-Z0-9]{6,}$/.test(v), message: 'Только латиница и цифры, минимум 6 символов' },
            password: { validate: v => v.length >= 8, message: 'Минимум 8 символов' },
            fullName: { validate: v => /^[а-яёА-ЯЁ\s]+$/.test(v), message: 'Только кириллица и пробелы' },
            phone: { validate: v => /^8\(\d{3}\)\d{3}-\d{2}-\d{2}$/.test(v), message: 'Формат: 8(XXX)XXX-XX-XX' },
            email: { validate: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), message: 'Некорректный email' }
        };

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', function() { validateField(this.id); });
            input.addEventListener('blur', function() { validateField(this.id); });
        });

        function validateField(fieldId) {
            const input = document.getElementById(fieldId);
            const errorEl = document.getElementById(fieldId + 'Error');
            const rule = rules[fieldId];
            const value = input.value.trim();

            input.classList.remove('error', 'valid');
            errorEl.classList.remove('show');

            if (value === '') {
                input.classList.add('error');
                errorEl.textContent = 'Поле обязательно';
                errorEl.classList.add('show');
                return false;
            }

            if (!rule.validate(value)) {
                input.classList.add('error');
                errorEl.textContent = rule.message;
                errorEl.classList.add('show');
                return false;
            }

            input.classList.add('valid');
            return true;
        }

        function handleSubmit(e) {
            e.preventDefault();
            let allValid = true;

            ['login', 'password', 'fullName', 'phone', 'email'].forEach(field => {
                if (!validateField(field)) allValid = false;
            });

            if (allValid) {
                const users = JSON.parse(localStorage.getItem('korochki_users') || '[]');
                const login = document.getElementById('login').value.trim();

                if (users.find(u => u.login === login)) {
                    document.getElementById('loginError').textContent = 'Логин уже занят';
                    document.getElementById('loginError').classList.add('show');
                    document.getElementById('login').classList.add('error');
                    return false;
                }

                const user = {
                    login: login,
                    password: document.getElementById('password').value,
                    fullName: document.getElementById('fullName').value.trim(),
                    phone: document.getElementById('phone').value.trim(),
                    email: document.getElementById('email').value.trim(),
                    createdAt: new Date().toISOString()
                };
                users.push(user);
                localStorage.setItem('korochki_users', JSON.stringify(users));

                document.getElementById('successBox').classList.add('show');
                setTimeout(() => { window.location.href = 'login2.html'; }, 1500);
            }
            return false;
        }
    </script>
</body>
</html>
