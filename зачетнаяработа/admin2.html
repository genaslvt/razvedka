<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть — Админ-панель (Тёмная)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
        }
        .header {
            background: #0f172a;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }
        .header a { color: #fff; text-decoration: none; font-size: 14px; }
        .container { max-width: 1300px; margin: 24px auto; padding: 0 16px; }
        .filters {
            background: #1e293b;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .filters select, .filters input {
            padding: 8px 12px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #0f172a;
            color: #f1f5f9;
        }
        .search-box { flex: 1; max-width: 300px; }
        .search-box input { width: 100%; }
        table {
            width: 100%;
            background: #1e293b;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        th, td {
            padding: 12px 14px;
            text-align: left;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            vertical-align: middle;
            color: #f1f5f9;
        }
        th { background: #334155; font-weight: 600; }
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            display: inline-block;
        }
        .status-new { background: #451a03; color: #fcd34d; }
        .status-progress { background: #1e3a5f; color: #93c5fd; }
        .status-done { background: #064e3b; color: #6ee7b7; }
        .btn-sm {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin: 2px;
        }
        .btn-blue { background: #3b82f6; color: #fff; }
        .btn-green { background: #10b981; color: #fff; }
        .btn-red { background: #ef4444; color: #fff; }
        .btn-blue:hover { background: #2563eb; }
        .btn-green:hover { background: #059669; }
        .btn-red:hover { background: #dc2626; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #10b981;
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            z-index: 99;
        }
        .toast.error { background: #ef4444; }
        .toast.show { display: block; }
        .pagination { display: flex; gap: 8px; margin-top: 16px; justify-content: center; flex-wrap: wrap; }
        .pagination button {
            padding: 8px 12px;
            border: 1px solid #334155;
            border-radius: 6px;
            background: #1e293b;
            color: #f1f5f9;
            cursor: pointer;
        }
        .pagination button.active { background: #4f46e5; color: #fff; border-color: #4f46e5; }
        .course-thumb { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        .stats {
            background: linear-gradient(135deg, #1e1b4b 0%, #2e1065 100%);
            color: white;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 15px;
        }
        .stat-item { text-align: center; cursor: pointer; transition: transform 0.2s; }
        .stat-item:hover { transform: scale(1.05); }
        .stat-number { font-size: 28px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.9; }
        .action-buttons { display: flex; gap: 5px; flex-wrap: wrap; }
        .delete-all-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
        }
        .delete-all-btn:hover { background: #b91c1c; }
        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover { transform: scale(1.1); }
        .header-controls { display: flex; gap: 12px; align-items: center; }
    </style>
</head>
<body>
    <header class="header">
        <strong>🎓 Корочки.есть — Администратор</strong>
        <div class="header-controls">
            <button class="theme-toggle" onclick="window.location.href='admin.html'">☀️</button>
            <a href="#" onclick="logout()">🚪 Выйти</a>
        </div>
    </header>

    <div class="container">
        <h2 style="margin-bottom:16px; color: #f1f5f9;">📊 Панель управления</h2>
        <div class="stats" id="statsPanel"></div>
        <div class="filters">
            <label style="color: #f1f5f9;">🔍 Фильтр по статусу:</label>
            <select id="statusFilter" onchange="currentPage=1; renderTable()">
                <option value="">Все</option>
                <option value="new">🆕 Новая</option>
                <option value="in_progress">📖 Идёт обучение</option>
                <option value="completed">✅ Завершено</option>
            </select>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="🔎 Поиск..." oninput="currentPage=1; renderTable()">
            </div>
            <span id="totalCount" style="color:#94a3b8; font-size:13px;"></span>
            <button class="delete-all-btn" onclick="deleteAllFiltered()">🗑️ Удалить все</button>
        </div>
        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr><th>ID</th><th>Фото</th><th>Пользователь</th><th>Курс</th><th>Дата начала</th><th>Оплата</th><th>Статус</th><th>Действия</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
    <div class="toast" id="toast">✅ Статус обновлён</div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('korochki_current_user'));
        if (!currentUser || currentUser.role !== 'admin') { window.location.href = 'login2.html'; }

        const ITEMS_PER_PAGE = 7;
        let currentPage = 1;

        function getAllApplications() { return JSON.parse(localStorage.getItem('korochki_applications') || '[]'); }
        function saveApplications(apps) { localStorage.setItem('korochki_applications', JSON.stringify(apps)); }
        
        function getFilteredApplications() {
            let apps = getAllApplications();
            const statusFilter = document.getElementById('statusFilter').value;
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            if (statusFilter) apps = apps.filter(a => a.status === statusFilter);
            if (searchTerm) apps = apps.filter(a => a.userLogin.toLowerCase().includes(searchTerm) || a.courseName.toLowerCase().includes(searchTerm));
            return apps;
        }

        function getCourseImage(courseName) {
            const images = {
                'Основы алгоритмизации и программирования': 'image01.webp',
                'Основы веб-дизайна': 'image02.jpg',
                'Основы проектирования баз данных': 'image03.png',
                'Python для начинающих': 'image04.jpg',
                'JavaScript & React': 'image05.jpg',
                'UI/UX Дизайн': 'image06.jpg'
            };
            return images[courseName] || 'image01.webp';
        }

        function renderStats() {
            const apps = getAllApplications();
            document.getElementById('statsPanel').innerHTML = `
                <div class="stat-item" onclick="document.getElementById('statusFilter').value=''; document.getElementById('searchInput').value=''; renderTable();">
                    <div class="stat-number">${apps.length}</div><div class="stat-label">📊 Всего</div>
                </div>
                <div class="stat-item" onclick="document.getElementById('statusFilter').value='new'; renderTable();">
                    <div class="stat-number">${apps.filter(a => a.status === 'new').length}</div><div class="stat-label">🆕 Новых</div>
                </div>
                <div class="stat-item" onclick="document.getElementById('statusFilter').value='in_progress'; renderTable();">
                    <div class="stat-number">${apps.filter(a => a.status === 'in_progress').length}</div><div class="stat-label">📖 В процессе</div>
                </div>
                <div class="stat-item" onclick="document.getElementById('statusFilter').value='completed'; renderTable();">
                    <div class="stat-number">${apps.filter(a => a.status === 'completed').length}</div><div class="stat-label">✅ Завершено</div>
                </div>
            `;
        }

        function renderTable() {
            let apps = getFilteredApplications();
            document.getElementById('totalCount').textContent = `📋 Найдено: ${apps.length}`;
            const totalPages = Math.ceil(apps.length / ITEMS_PER_PAGE);
            if (currentPage > totalPages) currentPage = totalPages || 1;
            const start = (currentPage - 1) * ITEMS_PER_PAGE;
            const pageApps = apps.slice(start, start + ITEMS_PER_PAGE);
            
            if (pageApps.length === 0) {
                document.getElementById('tableBody').innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">📭 Заявок не найдено</td></tr>';
            } else {
                document.getElementById('tableBody').innerHTML = pageApps.map((a, index) => {
                    const actualIndex = start + index;
                    return `<tr>
                        <td>${actualIndex + 1}</td>
                        <td><img src="${a.courseImage || getCourseImage(a.courseName)}" class="course-thumb" onerror="this.src='https://via.placeholder.com/50x50'"></td>
                        <td><strong>${escapeHtml(a.userLogin)}</strong></td>
                        <td>${escapeHtml(a.courseName)}</td>
                        <td>${a.startDate}</td>
                        <td>${a.paymentMethod === 'cash' ? '💵 Наличными' : a.paymentMethod === 'phone_transfer' ? '📱 Перевод' : '💳 Карта'}</td>
                        <td><span class="status status-${a.status === 'new' ? 'new' : a.status === 'in_progress' ? 'progress' : 'done'}">${a.status === 'new' ? '🆕 Новая' : a.status === 'in_progress' ? '📖 Идёт обучение' : '✅ Завершено'}</span></td>
                        <td class="action-buttons">
                            ${a.status === 'new' ? `<button class="btn-sm btn-blue" onclick="changeStatus(${actualIndex}, 'in_progress')">▶ Начать</button>` : ''}
                            ${a.status === 'in_progress' ? `<button class="btn-sm btn-green" onclick="changeStatus(${actualIndex}, 'completed')">✅ Завершить</button>` : ''}
                            <button class="btn-sm btn-red" onclick="deleteApplication(${actualIndex})">🗑️ Удалить</button>
                        </td>
                    </tr>`;
                }).join('');
            }
            
            let pagHTML = '';
            if (totalPages > 1) {
                if (currentPage > 1) pagHTML += `<button onclick="goToPage(${currentPage - 1})">←</button>`;
                for (let p = 1; p <= totalPages; p++) {
                    if (Math.abs(p - currentPage) <= 2 || p === 1 || p === totalPages)
                        pagHTML += `<button class="${p === currentPage ? 'active' : ''}" onclick="goToPage(${p})">${p}</button>`;
                }
                if (currentPage < totalPages) pagHTML += `<button onclick="goToPage(${currentPage + 1})">→</button>`;
            }
            document.getElementById('pagination').innerHTML = pagHTML;
            renderStats();
        }

        function changeStatus(appIndex, newStatus) {
            const allApps = getAllApplications();
            const filteredApps = getFilteredApplications();
            const actualApp = filteredApps[appIndex];
            if (actualApp) {
                const realIndex = allApps.findIndex(a => a.id === actualApp.id);
                if (realIndex !== -1) {
                    allApps[realIndex].status = newStatus;
                    saveApplications(allApps);
                    showToast(`✅ Статус обновлён`);
                    renderTable();
                }
            }
        }

        function deleteApplication(appIndex) {
            const filteredApps = getFilteredApplications();
            const appToDelete = filteredApps[appIndex];
            if (appToDelete) {
                let allApps = getAllApplications();
                allApps = allApps.filter(a => a.id !== appToDelete.id);
                saveApplications(allApps);
                showToast(`🗑️ Заявка удалена`, 'error');
                renderTable();
            }
        }

        function deleteAllFiltered() {
            const filteredApps = getFilteredApplications();
            if (filteredApps.length === 0) { showToast('❌ Нет заявок', 'error'); return; }
            const filteredIds = new Set(filteredApps.map(a => a.id));
            let allApps = getAllApplications();
            allApps = allApps.filter(a => !filteredIds.has(a.id));
            saveApplications(allApps);
            showToast(`🗑️ Удалено ${filteredApps.length} заявок`, 'error');
            currentPage = 1;
            renderTable();
        }

        function goToPage(page) { currentPage = page; renderTable(); }
        function showToast(msg, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast ' + (type === 'error' ? 'error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        function logout() { localStorage.removeItem('korochki_current_user'); window.location.href = 'login2.html'; }
        renderTable();
    </script>
</body>
</html>
