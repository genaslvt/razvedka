<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корочки.есть — Мои заявки (Тёмная)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f172a;
            min-height: 100vh;
        }
        .header {
            background: #312e81;
            color: #fff;
            padding: 14px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .header .logo { font-size: 18px; font-weight: bold; }
        .header nav { display: flex; gap: 12px; align-items: center; }
        .header a { 
            color: #fff; text-decoration: none; font-size: 14px;
            padding: 6px 12px; border-radius: 6px; transition: background 0.2s;
        }
        .header a:hover { background: rgba(255,255,255,0.2); }
        .container { max-width: 1000px; margin: 24px auto; padding: 0 16px; }
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            gap: 20px;
            transition: transform 0.2s ease;
            flex-wrap: wrap;
        }
        .card:hover { transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.4); }
        .card-image {
            flex-shrink: 0;
            width: 140px;
            height: 140px;
            border-radius: 8px;
            overflow: hidden;
        }
        .card-image img { width: 100%; height: 100%; object-fit: cover; }
        .card-content { flex: 1; min-width: 200px; }
        .card h3 { margin-bottom: 8px; color: #f1f5f9; }
        .card p { color: #94a3b8; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-new { background: #451a03; color: #fcd34d; }
        .status-progress { background: #1e3a5f; color: #93c5fd; }
        .status-done { background: #064e3b; color: #6ee7b7; }
        .btn {
            padding: 8px 20px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover { background: #818cf8; }
        .btn-small { padding: 4px 12px; font-size: 11px; }
        .empty { text-align: center; color: #94a3b8; padding: 40px; }
        .empty a { color: #818cf8; }
        .review-section { 
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #334155;
        }
        .review-section textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #334155;
            border-radius: 6px;
            font-size: 13px;
            resize: vertical;
            font-family: inherit;
            background: #0f172a;
            color: #f1f5f9;
        }
        .review-section select { 
            padding: 6px; border-radius: 6px; margin: 6px 0;
            border: 1px solid #334155;
            background: #0f172a;
            color: #f1f5f9;
        }
        .logout-btn { background: #ef4444; }
        .logout-btn:hover { background: #dc2626; }
        .existing-review {
            background: #0f172a;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
        }
        .existing-review .rating { color: #f59e0b; font-size: 14px; margin-bottom: 6px; }
        .existing-review .review-text { font-size: 13px; color: #f1f5f9; line-height: 1.4; }
        .review-date { font-size: 10px; color: #64748b; margin-top: 6px; }
        .btn-outline {
            background: none;
            border: 1px solid #818cf8;
            color: #818cf8;
        }
        .btn-outline:hover { background: #818cf8; color: white; }
        .active-link { background: rgba(255,255,255,0.25); font-weight: bold; }
        .theme-toggle {
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .theme-toggle:hover { transform: scale(1.1); }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🎓 Корочки.есть</div>
        <nav>
            <a href="applications2.html" class="active-link">📋 Мои заявки</a>
            <a href="create_application2.html">➕ Новая заявка</a>
            <button class="theme-toggle" onclick="window.location.href='applications.html'">☀️</button>
            <a href="#" onclick="logout()" class="logout-btn">🚪 Выйти</a>
        </nav>
    </header>

    <div class="container">
        <h2 style="margin-bottom:16px; color: #f1f5f9;">📋 Мои заявки</h2>
        <div id="applicationsList"></div>
    </div>

    <script>
        const currentUser = JSON.parse(localStorage.getItem('korochki_current_user'));
        if (!currentUser) { window.location.href = 'login2.html'; }
        if (currentUser.role === 'admin') { window.location.href = 'admin2.html'; }

        function getCourseImage(courseName) {
            const images = {
                'Основы алгоритмизации и программирования': 'image01.webp',
                'Основы веб-дизайна': 'image02.jpg',
                'Основы проектирования баз данных': 'image03.png',
                'Python для начинающих': 'image04.jpg',
                'JavaScript & React': 'image05.jpg',
                'UI/UX Дизайн': 'image06.jpg'
            };
            return images[courseName] || 'image01.webp';
        }

        function getApplications() {
            const allApps = JSON.parse(localStorage.getItem('korochki_applications') || '[]');
            return allApps.filter(a => a.userLogin === currentUser.login);
        }

        function getReviewForApplication(applicationId) {
            const allReviews = JSON.parse(localStorage.getItem('korochki_reviews') || '[]');
            return allReviews.find(r => r.applicationId === applicationId);
        }

        function saveReview(review) {
            const reviews = JSON.parse(localStorage.getItem('korochki_reviews') || '[]');
            reviews.push(review);
            localStorage.setItem('korochki_reviews', JSON.stringify(reviews));
        }

        function updateReview(reviewId, newText, newRating) {
            const reviews = JSON.parse(localStorage.getItem('korochki_reviews') || '[]');
            const index = reviews.findIndex(r => r.id === reviewId);
            if (index !== -1) {
                reviews[index].text = newText;
                reviews[index].rating = newRating;
                reviews[index].updatedAt = new Date().toISOString();
                localStorage.setItem('korochki_reviews', JSON.stringify(reviews));
                return true;
            }
            return false;
        }

        function deleteReview(reviewId) {
            let reviews = JSON.parse(localStorage.getItem('korochki_reviews') || '[]');
            reviews = reviews.filter(r => r.id !== reviewId);
            localStorage.setItem('korochki_reviews', JSON.stringify(reviews));
        }

        window.submitReview = function(applicationId, courseName, startDate) {
            const textarea = document.getElementById(`reviewText_${applicationId}`);
            const select = document.getElementById(`rating_${applicationId}`);
            if (!textarea || !select) return;
            const text = textarea.value.trim();
            const rating = parseInt(select.value);
            if (text.length < 10) {
                alert('❌ Отзыв должен содержать минимум 10 символов');
                textarea.focus();
                return;
            }
            const review = {
                id: Date.now(),
                userLogin: currentUser.login,
                courseName: courseName,
                startDate: startDate,
                text: text,
                rating: rating,
                createdAt: new Date().toISOString(),
                applicationId: applicationId
            };
            saveReview(review);
            alert('✅ Спасибо за отзыв!');
            renderApplications();
        }

        window.editReview = function(reviewId, currentText, currentRating, applicationId, courseName, startDate) {
            const newText = prompt('Редактировать отзыв:', currentText);
            if (newText !== null && newText.trim().length >= 10) {
                const newRating = prompt('Оценка (1-5):', currentRating);
                if (newRating !== null && newRating >= 1 && newRating <= 5) {
                    updateReview(reviewId, newText.trim(), parseInt(newRating));
                    alert('✅ Отзыв обновлён');
                    renderApplications();
                } else if (newRating !== null) {
                    alert('❌ Оценка должна быть от 1 до 5');
                }
            } else if (newText !== null && newText.trim().length < 10) {
                alert('❌ Отзыв должен содержать минимум 10 символов');
            }
        }

        window.removeReview = function(reviewId) {
            if (confirm('Удалить этот отзыв?')) {
                deleteReview(reviewId);
                alert('🗑️ Отзыв удалён');
                renderApplications();
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function renderApplications() {
            const apps = getApplications();
            const container = document.getElementById('applicationsList');
            if (apps.length === 0) {
                container.innerHTML = '<div class="empty">📭 У вас пока нет заявок. <a href="create_application2.html">Создать заявку</a></div>';
                return;
            }
            container.innerHTML = apps.map((a) => {
                const applicationId = a.id;
                const existingReview = getReviewForApplication(applicationId);
                const hasReview = !!existingReview;
                return `
                    <div class="card">
                        <div class="card-image">
                            <img src="${a.courseImage || getCourseImage(a.courseName)}" alt="${a.courseName}" onerror="this.src='https://via.placeholder.com/140x140?text=Course'">
                        </div>
                        <div class="card-content">
                            <h3>${escapeHtml(a.courseName)}</h3>
                            <p>📅 Начало: ${a.startDate} | 💰 Оплата: ${a.paymentMethod === 'cash' ? 'Наличными' : a.paymentMethod === 'phone_transfer' ? 'Перевод по номеру' : 'Банковская карта'}</p>
                            <p>Статус: <span class="status status-${a.status === 'new' ? 'new' : a.status === 'in_progress' ? 'progress' : 'done'}">${a.status === 'new' ? '🆕 Новая' : a.status === 'in_progress' ? '📖 Идёт обучение' : '✅ Обучение завершено'}</span></p>
                            <p style="font-size:12px; margin-top:4px;">📅 Создана: ${new Date(a.createdAt).toLocaleString('ru')}</p>
                            ${a.status === 'completed' ? `
                                <div class="review-section">
                                    ${!hasReview ? `
                                        <strong>⭐ Оставить отзыв о курсе:</strong>
                                        <select id="rating_${applicationId}">
                                            <option value="5">⭐⭐⭐⭐⭐ 5</option>
                                            <option value="4">⭐⭐⭐⭐ 4</option>
                                            <option value="3">⭐⭐⭐ 3</option>
                                            <option value="2">⭐⭐ 2</option>
                                            <option value="1">⭐ 1</option>
                                        </select>
                                        <textarea id="reviewText_${applicationId}" rows="2" placeholder="Поделитесь впечатлениями о курсе..."></textarea>
                                        <button class="btn btn-small" onclick="submitReview(${applicationId}, '${escapeHtml(a.courseName)}', '${a.startDate}')" style="margin-top:6px;">📝 Отправить отзыв</button>
                                    ` : `
                                        <div class="existing-review">
                                            <div class="rating">${'⭐'.repeat(existingReview.rating)}${'☆'.repeat(5-existingReview.rating)} (${existingReview.rating}/5)</div>
                                            <div class="review-text">${escapeHtml(existingReview.text)}</div>
                                            <div class="review-date">📅 Отзыв оставлен: ${new Date(existingReview.createdAt).toLocaleString('ru')}</div>
                                            <div style="margin-top: 8px; display: flex; gap: 8px;">
                                                <button class="btn btn-small btn-outline" onclick="editReview(${existingReview.id}, '${escapeHtml(existingReview.text)}', ${existingReview.rating}, ${applicationId}, '${escapeHtml(a.courseName)}', '${a.startDate}')">✏️ Редактировать</button>
                                                <button class="btn btn-small btn-outline" style="border-color:#ef4444; color:#ef4444;" onclick="removeReview(${existingReview.id})">🗑️ Удалить</button>
                                            </div>
                                        </div>
                                    `}
                                </div>
                            ` : (a.status === 'new' ? '<p style="font-size:12px; margin-top:8px;">💬 Отзыв можно оставить после завершения курса</p>' : '<p style="font-size:12px; margin-top:8px;">📚 Идёт обучение. Отзыв будет доступен после завершения</p>')}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function logout() {
            localStorage.removeItem('korochki_current_user');
            window.location.href = 'login2.html';
        }

        renderApplications();
    </script>
</body>
</html>
